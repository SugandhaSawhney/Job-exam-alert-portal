# ──────────────────────────────────────────────
# Kubernetes Service — exposes the app
# NodePort: access via http://<node-ip>:30080
# ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: job-alert-portal-service
  namespace: default
  labels:
    app: job-alert-portal
spec:
  type: NodePort
  selector:
    app: job-alert-portal
  ports:
    - name: http
      protocol: TCP
      port: 80           # Service port (internal)
      targetPort: 8080   # Pod port
      nodePort: 30080    # External port (30000-32767)
