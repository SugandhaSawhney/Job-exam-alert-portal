# ──────────────────────────────────────────────────────────────
# Ansible Inventory — hosts.ini
# Replace IP addresses with your actual server IPs
# ──────────────────────────────────────────────────────────────

[jenkins_server]
192.168.1.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[k8s_nodes]
192.168.1.20 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa  k8s_role=master
192.168.1.21 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa  k8s_role=worker

[all:vars]
ansible_python_interpreter=/usr/bin/python3

# ──────────────────────────────────────────────────────────────
# For local/single-machine testing (Minikube), use:
# ──────────────────────────────────────────────────────────────
# [all]
# localhost ansible_connection=local
